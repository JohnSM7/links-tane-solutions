runConfig:
  runtime: nodejs20
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  build: npm ci && npm run build
  run: npm start

env:
  - variable: HOST
    value: 0.0.0.0
  - variable: PORT
    value: "8080"
  - variable: SUPABASE_URL
    secret: SUPABASE_URL
  - variable: SUPABASE_SERVICE_KEY
    secret: SUPABASE_SERVICE_KEY
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
  - variable: ADMIN_SECRET
    secret: ADMIN_SECRET
